name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -coverprofile=build/cover.out ./...

      - name: Integration tests (venom)
        run: make integration

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: build/*.cover.out
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Run golangci-lint via the Makefile (installs the pinned version) rather than
      # golangci-lint-action, which still ships on the deprecated Node 20 runtime.
      - name: golangci-lint
        run: make lint

  vuln:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: make vuln

  # Sanity check that every OS/arch target cross-compiles, without publishing.
  cross-build:
    name: Cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all release targets
        run: make release VERSION=ci-snapshot RELEASE=1

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-snapshot
          path: dist/*
