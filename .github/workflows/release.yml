name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub release and upload assets

jobs:
  release:
    name: Build & publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for an accurate build commit

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: make release VERSION=${{ github.ref_name }} RELEASE=1

      # Use the preinstalled gh CLI rather than a Node-based action to publish.
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/*.tar.gz dist/*.zip dist/checksums.txt
          --title "${{ github.ref_name }}"
          --generate-notes
